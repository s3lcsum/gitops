log:
  level: INFO

accessLog: {}

entryPoints:
  web:
    address: ":80"
    asDefault: false
    http:
      redirections:
        entrypoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    asDefault: true
    http3: {}
    http:
      middlewares:
        - crowdsec-bouncer@file
        - secure-headers@file
        # - error-pages-middleware@docker
      tls:
        certResolver: letsencrypt
        domains:
          - main: dominiksiejak.pl
            sans:
              - '*.dominiksiejak.pl'

  traefik:
    address: ":8080"
    asDefault: false

  metrics:
    address: ":9100"
    asDefault: false

api:
  dashboard: true
  insecure: false

ping: {}

providers:
  docker:
    exposedByDefault: false
    network: proxy
    defaultRule: "Host(`{{ .ContainerName }}.dominiksiejak.pl`)"
  file:
    filename: /etc/traefik/dynamic.yaml

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@dominiksiejak.pl
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: cloudflare
        delayBeforeCheck: "0"
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
        disablePropagationCheck: false
  vaultpki:
    acme:
      email: admin@dominiksiejak.pl
      storage: /letsencrypt/vault-acme.json
      caServer: "http://vault:8200/v1/pki_int/acme/directory"
      httpChallenge:
        entryPoint: web

metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0

experimental:
  plugins:
    crowdsec-bouncer-traefik-plugin:
      moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
      version: "v1.4.4"
