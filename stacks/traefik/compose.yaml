# github.com/s3lcsum/gitops/stacks/traefik/compose.yaml

services:
  traefik:
    image: ghcr.io/traefik/traefik:v3.7.5
    container_name: traefik
    restart: unless-stopped
    user: root
    networks:
      - default
      - metrics
      - proxy
    env_file:
      - /opt/traefik/traefik.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - 80:80
      - 443:443
      - 9100:9100 # Prometheus metrics
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - /opt/traefik/dynamic.yaml:/etc/traefik/dynamic.yaml:ro
      - traefik-letsencrypt:/letsencrypt
    labels:
      traefik.enable: "true"
      traefik.http.routers.traefik-dashboard.service: api@internal
      traefik.http.routers.traefik-dashboard.middlewares: authentik@docker
      homepage.group: Core
      homepage.name: Traefik
      homepage.icon: traefik
      homepage.href: https://traefik.dominiksiejak.pl
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  crowdsec:
    image: ghcr.io/crowdsecurity/crowdsec:v1.7.8
    container_name: crowdsec
    restart: unless-stopped
    networks:
      - proxy
    env_file:
      - /opt/traefik/crowdsec.env
    volumes:
      - crowdsec-config:/etc/crowdsec
      - crowdsec-data:/var/lib/crowdsec/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6060/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  error-pages:
    image: ghcr.io/tarampampam/error-pages:4.2.1
    restart: unless-stopped
    container_name: error-pages
    networks:
      - proxy
    environment:
      TEMPLATE_NAME: "ghost"
      SEND_SAME_HTTP_CODE: "true"
    labels:
      traefik.enable: true
      traefik.http.routers.error-pages-router.rule: "HostRegexp(`{host:.+}`) || ClientIP(`0.0.0.0/0`)"
      traefik.http.routers.error-pages-router.priority: 10
      traefik.http.routers.error-pages-router.entrypoints: web,websecure
      traefik.http.routers.error-pages-router.middlewares: error-pages-middleware
      traefik.http.middlewares.error-pages-middleware.errors.status: 400-599
      traefik.http.middlewares.error-pages-middleware.errors.service: error-pages-service
      traefik.http.middlewares.error-pages-middleware.errors.query: /{status}.html
      traefik.http.services.error-pages-service.loadbalancer.server.port: 8080

networks:
  metrics:
    external: true
  proxy:
    external: true

volumes:
  traefik-letsencrypt:
  crowdsec-config:
  crowdsec-data:
