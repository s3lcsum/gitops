          username: "{{HOMEPAGE_VAR_MIKROTIK_USER}}"
          password: "{{HOMEPAGE_VAR_MIKROTIK_PASS}}"

    - AdGuard:
        icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/adguard-home.png
