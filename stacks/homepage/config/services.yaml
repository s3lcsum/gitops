---
# Services — single source of truth. Docker discovery disabled.

- Core:
    - Traefik:
        icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/traefik.png
        href: https://traefik.dominiksiejak.pl
        description: Reverse proxy
        widget:
          type: traefik
          url: http://traefik:8080

    - Grafana:
        icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/grafana.png
        href: https://grafana.dominiksiejak.pl
        description: Dashboards
        widget:
          type: grafana
          url: http://grafana:3000
          auth:
            token: "{{HOMEPAGE_VAR_GRAFANA_TOKEN}}"

    - Gatus:
        icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/gatus.png
        href: https://status.dominiksiejak.pl
        description: Uptime monitoring
        widget:
          type: gatus
          url: http://gatus:8080

    - Dozzle:
        icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/dozzle.png
        href: https://dozzle.dominiksiejak.pl
        description: Log viewer

    - Metrics:
        icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/victoriametrics.png
        href: https://metrics.dominiksiejak.pl
        description: Telemetry

- Security:
    - Authentik:
        icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/authentik.png
        href: https://auth.dominiksiejak.pl
        description: SSO / Identity
        widget:
          type: authentik
          url: http://authentik-server:9000
          key: "{{HOMEPAGE_VAR_AUTHENTIK_KEY}}"
          version: 2

    - Vault:
        icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/vault.png
        href: https://vault.dominiksiejak.pl
        description: Secrets engine

    - Vaultwarden:
        icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/vaultwarden.png
        href: https://vaultwarden.dominiksiejak.pl
        description: Password manager

- Infrastructure:
    - Portainer:
        icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/portainer.png
        href: https://portainer.dominiksiejak.pl
        description: Container management
        widget:
          type: portainer
          url: http://portainer:9000
          env: 3
          key: "{{HOMEPAGE_VAR_PORTAINER_TOKEN}}"

    - Proxmox:
        icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/proxmox.png
        href: https://192.168.89.254:8006
        description: Hypervisor
        widget:
          type: proxmox
          url: https://192.168.89.254:8006
          username: "{{HOMEPAGE_VAR_PROXMOX_TOKEN_ID}}"
          password: "{{HOMEPAGE_VAR_PROXMOX_TOKEN_SECRET}}"

    - Synology:
        icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/synology.png
        href: https://192.168.89.240:5001
        description: NAS
        widget:
          type: diskstation
          url: https://192.168.89.240:5001
          username: "{{HOMEPAGE_VAR_SYNOLOGY_USER}}"
          password: "{{HOMEPAGE_VAR_SYNOLOGY_PASS}}"

    - Cloudflare:
        icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/cloudflare.png
        href: https://dash.cloudflare.com
        description: DNS / CDN / tunnels
        widget:
          type: cloudflared
          accountid: e092ee6780d8a561afd1530702c0fd6a
          tunnelid: 7e230993-1b79-43a6-bd1d-cc75f57bf18b
          key: "{{HOMEPAGE_VAR_CLOUDFLARE_API_KEY}}"

- Network:
