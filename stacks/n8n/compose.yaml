# https://github.com/s3lcsum/gitops/blob/main/stacks/n8n/compose.yaml


services:
  n8n:
    image: ghcr.io/n8n-io/n8n:2.25.7
    container_name: n8n
    restart: unless-stopped
    env_file:
      - /opt/n8n/n8n.env
    environment:
      N8N_METRICS: true
      N8N_RUNNERS_ENABLED: true
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: true
      N8N_EDITOR_BASE_URL: https://n8n.dominiksiejak.pl
      WEBHOOK_URL: https://n8n.dominiksiejak.pl/
      N8N_HOST: n8n.dominiksiejak.pl
      N8N_PROTOCOL: https
      N8N_SSRF_PROTECTION_ENABLED: false
    volumes:
      - config:/home/node/.n8n
    networks:
      - proxy
      - database
      - metrics
    labels:
      traefik.enable: true
      traefik.http.services.n8n.loadbalancer.server.port: 5678
      traefik.http.routers.n8n.middlewares: remote@file

networks:
  proxy:
    external: true
  database:
    external: true
  metrics:
    external: true

volumes:
  config:
