x-default: &default
  restart: unless-stopped
  environment:
    TZ: Europe/Warsaw
services:
  hass:
    <<: *default
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: hass
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - data:/config
    network_mode: host # Otherwise autodiscovery won't work
    labels:
      traefik.enable: true
      traefik.http.routers.hass.rule: Host(`hass.lake.dominiksiejak.pl`) || Host(`hass.hello.dominiksiejak.pl`)
      traefik.http.services.hass.loadbalancer.server.url: http://host.docker.internal:8123

  zigbee2mqtt:
    <<: *default
    image: ghcr.io/koenkk/zigbee2mqtt:latest
    container_name: zigbee2mqtt
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - zigbee2mqtt_data:/app/data
      - /opt/hass/zigbee2mqtt.yaml:/app/data/configuration.yaml
    networks:
      - proxy
    extra_hosts:
      - "mosquitto:host-gateway"
    labels:
      traefik.enable: true
      traefik.docker.network: proxy
      traefik.http.routers.zigbee2mqtt.rule: Host(`zigbee2mqtt.lake.dominiksiejak.pl`)
      traefik.http.services.zigbee2mqtt.loadbalancer.server.port: 8080
      traefik.http.routers.zigbee2mqtt.middlewares: authentik@docker

  mosquitto:
    <<: *default
    image: eclipse-mosquitto:2
    container_name: mosquitto
    volumes:
      - /opt/hass/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    network_mode: host # Because home-assistant have to be on the same network as the coordinator
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mosquitto_sub -h 127.0.0.1 -p 1883 -t '$$SYS/broker/uptime' -C 1 -W 3",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  esphome:
    <<: *default
    image: ghcr.io/esphome/esphome:stable
    container_name: esphome
    privileged: true
    network_mode: host # Autodiscovery won't work otherwise
    volumes:
      - esphome_data:/config
    labels:
      traefik.enable: true
      traefik.http.routers.esphome.rule: Host(`esphome.lake.dominiksiejak.pl`)
      traefik.http.services.esphome.loadbalancer.server.url: http://host.docker.internal:6052

  ha-time-machine:
    <<: *default
    image: ghcr.io/saihgupr/homeassistanttimemachine:latest
    container_name: ha-time-machine
    profiles:
      - timemachine
    env_file:
      - /opt/hass/timemachine.env
    environment:
      TZ: Europe/Warsaw
      HOME_ASSISTANT_URL: http://host.docker.internal:8123
      ESPHOME_CONFIG_PATH: /esphome
      DEBUG_LOGS: "false"
      THEME: dark
    volumes:
      - data:/config
      - esphome_data:/esphome
      - /opt/hass/timemachine:/media/timemachine
      - ha_time_machine_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - proxy
    labels:
      traefik.enable: true
      traefik.docker.network: proxy
      traefik.http.routers.timemachine.rule: Host(`timemachine.lake.dominiksiejak.pl`)
      traefik.http.services.timemachine.loadbalancer.server.port: 54000
      traefik.http.routers.timemachine.middlewares: authentik@docker

networks:
  proxy:
    external: true

volumes:
  data:
    driver: local
    driver_opts:
      type: none
      device: /var/lib/homeassistant
      o: bind
  zigbee2mqtt_data:
  mosquitto_data:
  esphome_data:
  ha_time_machine_data:
