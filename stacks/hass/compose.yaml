x-default: &default
  restart: unless-stopped
  environment:
    TZ: Europe/Warsaw

services:
  hass:
    <<: *default
    image: ghcr.io/home-assistant/home-assistant:2026.7.2
    container_name: hass
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - data:/config
      - /var/lib/hass/media:/media
      - /var/run/docker.sock:/var/run/docker.sock:ro
    network_mode: host # Otherwise autodiscovery won't work
    labels:
      traefik.enable: true
      traefik.http.routers.hass.middlewares: remote@file
      traefik.http.services.hass.loadbalancer.server.url: http://host.docker.internal:8123

  zigbee2mqtt-wifi:
    <<: *default
    image: ghcr.io/koenkk/zigbee2mqtt:2.12.0
    container_name: zigbee2mqtt-wifi
    user: "1000:1000"
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - /var/lib/hass/zigbee2mqtt-wifi:/app/data
    networks:
      - proxy
    extra_hosts:
      - "mosquitto:host-gateway"
    labels:
      traefik.enable: true
      traefik.docker.network: proxy
      traefik.http.routers.zigbee2mqtt-wifi.middlewares: authentik@docker
      traefik.http.services.zigbee2mqtt-wifi.loadbalancer.server.port: "8080"

  zigbee2mqtt-usb:
    <<: *default
    image: ghcr.io/koenkk/zigbee2mqtt:2.12.0
    container_name: zigbee2mqtt-usb
    depends_on:
      mosquitto:
        condition: service_healthy
    volumes:
      - /var/lib/hass/zigbee2mqtt-usb:/app/data
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    networks:
      - proxy
    extra_hosts:
      - "mosquitto:host-gateway"
    labels:
      traefik.enable: true
      traefik.docker.network: proxy
      traefik.http.routers.zigbee2mqtt-usb.middlewares: authentik@docker
      traefik.http.services.zigbee2mqtt-usb.loadbalancer.server.port: "8080"

  mosquitto:
    <<: *default
    image: eclipse-mosquitto:2.1.2-alpine
    container_name: mosquitto
    volumes:
      - /opt/hass/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    network_mode: host # Because home-assistant have to be on the same network as the coordinator
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mosquitto_sub -h 127.0.0.1 -p 1883 -t '$$SYS/broker/uptime' -C 1 -W 3",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  hass-timemachine:
    <<: *default
    image: ghcr.io/saihgupr/homeassistanttimemachine:2.3.2
    container_name: hass-timemachine
    env_file:
      - /opt/hass/timemachine.env
    environment:
      TZ: Europe/Warsaw
      HOME_ASSISTANT_URL: http://host.docker.internal:8123
      ESPHOME_CONFIG_PATH: /esphome
      DEBUG_LOGS: "false"
      THEME: dark
    volumes:
      - data:/config
      - ha_time_machine_data:/media/timemachine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - proxy
    labels:
      traefik.enable: true
      traefik.docker.network: proxy
      traefik.http.routers.timemachine.middlewares: authentik@docker

networks:
  proxy:
    external: true

volumes:
  data:
    driver: local
    driver_opts:
      type: none
      device: /var/lib/hass
      o: bind
  mosquitto_data:
  ha_time_machine_data:
