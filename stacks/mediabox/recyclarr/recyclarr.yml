# ─────────────────────────────────────────────────────────────
# Recyclarr — TRaSH Guides sync for Sonarr & Radarr
# Docs: https://recyclarr.dev
# Secrets in secrets.yml (gitignored), referenced via !secret
# ─────────────────────────────────────────────────────────────
# Quality profiles:
#   WEB-1080p          → main TV (WEB-DL 1080p)
#   WEB-2160p          → special 4K TV (WEB-DL 2160p)
#   SQP-1 WEB (2160p)  → 4K movies only (WEB-DL, no Bluray)
# ─────────────────────────────────────────────────────────────

sonarr:
  tv:
    base_url: !secret sonarr_url
    api_key: !secret sonarr_apikey

    quality_definition:
      type: series

    quality_profiles:
      - trash_id: 72dae194fc92bf828f32cde7744e51a1  # WEB-1080p
        reset_unmatched_scores:
          enabled: true
        min_format_score: 100

      - trash_id: d1498e7d189fbe6c7110ceaabb7473e6  # WEB-2160p
        reset_unmatched_scores:
          enabled: true
        min_format_score: 100

radarr:
  movies-4k:
    base_url: !secret radarr_url
    api_key: !secret radarr_apikey

    quality_definition:
      type: sqp-streaming

    quality_profiles:
      - trash_id: e91c9adaca0231493f4af0d571b907f9  # [SQP] SQP-1 WEB (2160p)
        reset_unmatched_scores:
          enabled: true
        score_set: sqp-1-web-2160p
        upgrade:
          allowed: true
          until_quality: WEB 2160p
        min_format_score: 1000
        quality_sort: top
        qualities:
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
