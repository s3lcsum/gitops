# https://github.com/s3lcsum/gitops/blob/main/stacks/mediabox/compose.yaml
# Description: Media server stack with VPN, torrent client, and automation tools
# DISCLAIMER: This require a lot of manual configuration.
# You can find the guide here: https://github.com/Morzomb/All-jellyfin-media-server/blob/Main/README.md

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks: [proxy, arr]
  environment: &environment
    PUID: 0
    PGID: 0
    UMASK: 002
    TZ: Europe/Warsaw

services:
  # 🔒 VPN gateway (WireGuard via Mullvad)
  gluetun:
    <<: *service-defaults
    image: ghcr.io/qdm12/gluetun:v3.37.0
    container_name: gluetun
    env_file:
      - /opt/mediabox/gluetun.env
    networks:
      - proxy
    cap_add:
      - NET_ADMIN
    shm_size: 1gb
    healthcheck: &healthcheck
      test: ["CMD-SHELL", "nc -z localhost 8000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # 🔒 Torrent client (VPN-routed)
  qbittorrent:
    <<: *service-defaults
    image: ghcr.io/linuxserver/qbittorrent:v5.2.1-r0-ls253
    container_name: qbittorrent
    environment: *environment
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - qbittorrent_config:/config
      - /mnt/LOCAL_MEDIA/qbittorrent:/mnt/LOCAL_MEDIA/qbittorrent
    networks: []  # Override to empty since using network_mode
    network_mode: service:gluetun
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
    labels:
      traefik.enable: true
      traefik.http.services.qbittorrent.loadbalancer.server.port: 8080
      traefik.http.routers.qbittorrent.rule: Host(`qbittorrent.hello.dominiksiejak.pl`) || Host(`qbittorrent.lake.dominiksiejak.pl`)
      #traefik.http.routers.qbittorrent.middlewares: authentik@docker

  # 📥 Usenet downloader (VPN-routed)
  sabnzbd:
    <<: *service-defaults
    image: ghcr.io/linuxserver/sabnzbd:4.3.2-r0-ls87
    container_name: sabnzbd
    depends_on:
      gluetun:
        condition: service_healthy
    env_file:
      - /opt/mediabox/sabnzbd.env
    volumes:
      - sabnzbd_config:/config
      - /mnt/LOCAL_MEDIA/usenet:/mnt/LOCAL_MEDIA/usenet
      - /mnt/LOCAL_MEDIA/usenet/incomplete:/mnt/LOCAL_MEDIA/usenet/incomplete
    networks: []
    network_mode: service:gluetun
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8085/api?mode=version"]
    labels:
      traefik.enable: true
      traefik.http.services.sabnzbd.loadbalancer.server.port: 8085
      traefik.http.routers.sabnzbd.rule: Host(`sabnzbd.hello.dominiksiejak.pl`) || Host(`sabnzbd.lake.dominiksiejak.pl`)
      #traefik.http.routers.sabnzbd.middlewares: authentik@docker

  # 🌐 Cloudflare bypass for indexers
  flaresolverr:
    <<: *service-defaults
    image: ghcr.io/flaresolverr/flaresolverr:v3.3.13
    container_name: flaresolverr
    volumes:
      - flaresolverr_config:/app/data
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8191/"]

  prowlarr:
    <<: *service-defaults
    image: ghcr.io/linuxserver/prowlarr:1.20.2.4575-r0-ls244
    container_name: prowlarr
    depends_on:
      flaresolverr:
        condition: service_healthy
    volumes:
      - prowlarr_config:/config
    labels:
      traefik.enable: true
      traefik.docker.network: proxy
      traefik.http.services.prowlarr.loadbalancer.server.port: 9696

      # API: bypass Authentik, prowlarr enforces X-Api-Key
      traefik.http.routers.prowlarr-api.rule: (Host(`prowlarr.hello.dominiksiejak.pl`) || Host(`prowlarr.lake.dominiksiejak.pl`)) && PathPrefix(`/api`)
      traefik.http.routers.prowlarr-api.service: prowlarr
      traefik.http.routers.prowlarr-api.priority: 100

      # Web UI: behind Authentik SSO
      traefik.http.routers.prowlarr.rule: Host(`prowlarr.hello.dominiksiejak.pl`) || Host(`prowlarr.lake.dominiksiejak.pl`)
      traefik.http.routers.prowlarr.service: prowlarr
      traefik.http.routers.prowlarr.middlewares: authentik@docker
      traefik.http.routers.prowlarr.priority: 10
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]

  # 🎥 Movie automation
  radarr:
    <<: *service-defaults
    image: ghcr.io/linuxserver/radarr:5.14.3.11727-r0-ls287
    container_name: radarr
    depends_on:
      qbittorrent:
        condition: service_healthy
      sabnzbd:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
    volumes:
      - radarr_config:/config
      - /mnt/LOCAL_MEDIA:/mnt/LOCAL_MEDIA
      - /mnt/NAS_Shared_Media:/mnt/NAS_Shared_Media
    labels:
      traefik.enable: true
      traefik.docker.network: proxy
      traefik.http.services.radarr.loadbalancer.server.port: 7878

      # API: bypass Authentik, radarr enforces X-Api-Key
      traefik.http.routers.radarr-api.rule: (Host(`radarr.hello.dominiksiejak.pl`) || Host(`radarr.lake.dominiksiejak.pl`)) && PathPrefix(`/api`)
      traefik.http.routers.radarr-api.service: radarr
      traefik.http.routers.radarr-api.priority: 100

      # Web UI: behind Authentik SSO
      traefik.http.routers.radarr.rule: Host(`radarr.hello.dominiksiejak.pl`) || Host(`radarr.lake.dominiksiejak.pl`)
      traefik.http.routers.radarr.service: radarr
      traefik.http.routers.radarr.middlewares: authentik@docker
      traefik.http.routers.radarr.priority: 10
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:7878/"]

  # 📺 TV series automation
  sonarr:
    <<: *service-defaults
    image: ghcr.io/linuxserver/sonarr:4.0.8.2145-r0-ls278
    container_name: sonarr
    depends_on:
      qbittorrent:
        condition: service_healthy
      sabnzbd:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
    volumes:
      - sonarr_config:/config
      - /mnt/LOCAL_MEDIA:/mnt/LOCAL_MEDIA
      - /mnt/NAS_Shared_Media:/mnt/NAS_Shared_Media
    labels:
      traefik.enable: true
      traefik.docker.network: proxy
      traefik.http.services.sonarr.loadbalancer.server.port: 8989

      # API: bypass Authentik, sonarr enforces X-Api-Key
      traefik.http.routers.sonarr-api.rule: (Host(`sonarr.hello.dominiksiejak.pl`) || Host(`sonarr.lake.dominiksiejak.pl`)) && PathPrefix(`/api`)
      traefik.http.routers.sonarr-api.service: sonarr
      traefik.http.routers.sonarr-api.priority: 100

      # Web UI: behind Authentik SSO
      traefik.http.routers.sonarr.rule: Host(`sonarr.hello.dominiksiejak.pl`) || Host(`sonarr.lake.dominiksiejak.pl`)
      traefik.http.routers.sonarr.service: sonarr
      traefik.http.routers.sonarr.middlewares: authentik@docker
      traefik.http.routers.sonarr.priority: 10
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8989/"]


  # 🔄 Subtitle management
  bazarr:
    <<: *service-defaults
    image: ghcr.io/linuxserver/bazarr:1.4.6-r0-ls237
    container_name: bazarr
    volumes:
      - bazarr_config:/config
      - /mnt/LOCAL_MEDIA:/mnt/LOCAL_MEDIA
      - /mnt/NAS_Shared_Media:/mnt/NAS_Shared_Media
    labels:
      traefik.enable: true
      traefik.docker.network: proxy
      traefik.http.services.bazarr.loadbalancer.server.port: 6767

      # API: bypass Authentik, bazarr enforces X-Api-Key
      traefik.http.routers.bazarr-api.rule: (Host(`bazarr.hello.dominiksiejak.pl`) || Host(`bazarr.lake.dominiksiejak.pl`)) && PathPrefix(`/api`)
      traefik.http.routers.bazarr-api.service: bazarr
      traefik.http.routers.bazarr-api.priority: 100

      # Web UI: behind Authentik SSO
      traefik.http.routers.bazarr.rule: Host(`bazarr.hello.dominiksiejak.pl`) || Host(`bazarr.lake.dominiksiejak.pl`)
      traefik.http.routers.bazarr.service: bazarr
      traefik.http.routers.bazarr.middlewares: authentik@docker
      traefik.http.routers.bazarr.priority: 10

  # 📺 Media server (primary)
  jellyfin:
    <<: *service-defaults
    image: ghcr.io/linuxserver/jellyfin:10.10.3-r0-ls237
    container_name: jellyfin
    volumes:
      - jellyfin_config:/config
      - /mnt/LOCAL_MEDIA/tv:/mnt/LOCAL_MEDIA/tv
      - /mnt/NAS_Shared_Media/tv:/mnt/NAS_Shared_Media/tv
      - /mnt/LOCAL_MEDIA/movies:/mnt/LOCAL_MEDIA/movies
      - /mnt/NAS_Shared_Media/movies:/mnt/NAS_Shared_Media/movies
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "44"
      - "104"
    labels:
      traefik.enable: true
      traefik.http.services.jellyfin.loadbalancer.server.port: 8096
      traefik.http.routers.jellyfin.rule: Host(`jellyfin.hello.dominiksiejak.pl`) || Host(`jellyfin.lake.dominiksiejak.pl`)

  # 📥 Request manager
  # OIDC not in stable Seerr yet (upstream #1505). Image is still fallenbagel/jellyseerr — keep preview-OIDC until a release ships OIDC.
  seerr:
    <<: *service-defaults
    container_name: seerr
    image: fallenbagel/jellyseerr:preview-OIDC
    # OIDC discovery runs inside the container (fetch to issuer /.well-known/openid-configuration).
    # If public DNS points Authentik through Cloudflare, that fetch often gets HTML (challenge/error), not JSON.
    # Route the Authentik hostname to the Docker host so Traefik serves TLS and returns real OIDC metadata.
    # After deploy: in Seerr Settings → Network, enable "Trust Proxy" so OIDC redirect URIs use https behind Traefik.
    extra_hosts:
      - "auth.lake.dominiksiejak.pl:host-gateway"
    depends_on:
      jellyfin:
        condition: service_healthy
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
    volumes:
      - jellyseerr_config:/app/config
    labels:
      traefik.enable: true
      traefik.docker.network: proxy
      traefik.http.routers.jellyseerr.rule: 'Host(`seerr.hello.dominiksiejak.pl`) || Host(`seerr.lake.dominiksiejak.pl`)'
      traefik.http.services.jellyseerr.loadbalancer.server.port: 5055

networks:
  arr:
    driver: bridge
  proxy:
    external: true

volumes:
  qbittorrent_config:
  sabnzbd_config:
  radarr_config:
  sonarr_config:
  bazarr_config:
  jellyfin_config:
  jellyseerr_config:
  prowlarr_config:
  flaresolverr_config:
