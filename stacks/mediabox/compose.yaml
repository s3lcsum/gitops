# https://github.com/s3lcsum/gitops/blob/main/stacks/mediabox/compose.yaml
# Description: Media server stack with VPN, torrent client, and automation tools
# DISCLAIMER: This require a lot of manual configuration.
# You can find the guide here: https://github.com/Morzomb/All-jellyfin-media-server/blob/Main/README.md

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks: [proxy, arr]
  environment: &environment
    PUID: 0
    PGID: 0
    UMASK: 002
    TZ: Europe/Warsaw

services:
  # 🔒 VPN gateway (WireGuard via NordVPN)
  gluetun:
    <<: *service-defaults
    image: ghcr.io/qdm12/gluetun:v3.41.1
    container_name: gluetun
    env_file:
      - /opt/mediabox/gluetun.env
    networks:
      - proxy
    cap_add:
      - NET_ADMIN
    shm_size: 1gb
    healthcheck: &healthcheck
      test: ["CMD-SHELL", "nc -z localhost 8000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # 🔒 Torrent client (VPN-routed)
  qbittorrent:
    <<: *service-defaults
    image: ghcr.io/linuxserver/qbittorrent:5.2.1
    container_name: qbittorrent
    environment: *environment
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - qbittorrent_config:/config
      - /mnt/LOCAL_MEDIA:/mnt/LOCAL_MEDIA
      - /mnt/NAS_Shared_Media:/mnt/NAS_Shared_Media
    networks: []  # Override to empty since using network_mode
    network_mode: service:gluetun
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
    labels:
      traefik.enable: true
      traefik.docker.network: proxy
      traefik.http.services.qbittorrent.loadbalancer.server.port: 8080
      traefik.http.routers.qbittorrent.middlewares: remote@file

  # 📥 Usenet downloader (VPN-routed)
  sabnzbd:
    <<: *service-defaults
    image: ghcr.io/linuxserver/sabnzbd:5.0.3
    container_name: sabnzbd
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - sabnzbd_config:/config
      - /mnt/LOCAL_MEDIA:/mnt/LOCAL_MEDIA
      - /mnt/NAS_Shared_Media:/mnt/NAS_Shared_Media
    networks: []
    network_mode: service:gluetun
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8085/api?mode=version"]
    labels:
      traefik.enable: true
      traefik.docker.network: proxy
      traefik.http.services.sabnzbd.loadbalancer.server.port: 8085
      traefik.http.routers.sabnzbd.middlewares: remote@file

  # 🌐 Cloudflare bypass for indexers
  flaresolverr:
    <<: *service-defaults
    image: ghcr.io/flaresolverr/flaresolverr:v3.5.0
    container_name: flaresolverr
    volumes:
      - flaresolverr_config:/app/data
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8191/"]

  prowlarr:
    <<: *service-defaults
    image: lscr.io/linuxserver/prowlarr:2.4.0
    container_name: prowlarr
    depends_on:
      flaresolverr:
        condition: service_healthy
    volumes:
      - prowlarr_config:/config
    labels:
      traefik.enable: true
      traefik.docker.network: proxy
      traefik.http.services.prowlarr.loadbalancer.server.port: 9696
      traefik.http.routers.prowlarr.middlewares: remote@file
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]

  # 🎥 Movie automation
  radarr:
    <<: *service-defaults
    image: lscr.io/linuxserver/radarr:6.2.1
    container_name: radarr
    depends_on:
      qbittorrent:
        condition: service_healthy
      sabnzbd:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
    volumes:
      - radarr_config:/config
      - /mnt/LOCAL_MEDIA:/mnt/LOCAL_MEDIA
      - /mnt/NAS_Shared_Media:/mnt/NAS_Shared_Media
    labels:
      traefik.enable: true
      traefik.docker.network: proxy
      traefik.http.services.radarr.loadbalancer.server.port: 7878
      traefik.http.routers.radarr.middlewares: remote@file
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:7878/"]

  # 📺 TV series automation
  sonarr:
    <<: *service-defaults
    image: ghcr.io/linuxserver/sonarr:4.0.19
    container_name: sonarr
    depends_on:
      qbittorrent:
        condition: service_healthy
      sabnzbd:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
    ports:
      - 127.0.0.1:8989:8989
    volumes:
      - sonarr_config:/config
      - /mnt/LOCAL_MEDIA:/mnt/LOCAL_MEDIA
      - /mnt/NAS_Shared_Media:/mnt/NAS_Shared_Media
    labels:
      traefik.enable: true
      traefik.docker.network: proxy
      traefik.http.services.sonarr.loadbalancer.server.port: 8989
      traefik.http.routers.sonarr.middlewares: remote@file
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8989/"]


  # 📺 Media server (primary)
  jellyfin:
    <<: *service-defaults
    image: ghcr.io/linuxserver/jellyfin:10.11.11
    container_name: jellyfin
    volumes:
      - jellyfin_config:/config
      - /mnt/LOCAL_MEDIA/tv:/mnt/LOCAL_MEDIA/tv
      - /mnt/NAS_Shared_Media/tv:/mnt/NAS_Shared_Media/tv
      - /mnt/LOCAL_MEDIA/movies:/mnt/LOCAL_MEDIA/movies
      - /mnt/NAS_Shared_Media/movies:/mnt/NAS_Shared_Media/movies
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "44"
      - "104"
    labels:
      traefik.enable: true
      traefik.http.services.jellyfin.loadbalancer.server.port: 8096
      traefik.http.routers.jellyfin.middlewares: remote@file
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8096/System/Ping"]

  # 📥 Request manager
  seerr:
    <<: *service-defaults
    image: ghcr.io/seerr-team/seerr:v3.3.0
    container_name: seerr
    environment:
      <<: *environment
      PORT: 5055
    depends_on:
      jellyfin:
        condition: service_healthy
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
    volumes:
      - seerr_config:/app/config
    labels:
      traefik.enable: true
      traefik.docker.network: proxy
      traefik.http.routers.seerr.middlewares: remote@file
      traefik.http.services.seerr.loadbalancer.server.port: 5055

  # 📋 Profile management (TRaSH guides sync with web UI)
  profilarr:
    <<: *service-defaults
    image: ghcr.io/dictionarry-hub/profilarr:latest
    container_name: profilarr
    volumes:
      - profilarr_config:/config
    environment:
      <<: *environment
      ORIGIN: https://profilarr.dominiksiejak.pl
    labels:
      traefik.enable: true
      traefik.docker.network: proxy
      traefik.http.services.profilarr.loadbalancer.server.port: 6868
      traefik.http.routers.profilarr.middlewares: remote@file
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:6868/"]
networks:
  arr:
    driver: bridge
  proxy:
    external: true

volumes:
  qbittorrent_config:
  sabnzbd_config:
  radarr_config:
  sonarr_config:
  jellyfin_config:
  seerr_config:
  prowlarr_config:
  flaresolverr_config:
  profilarr_config:
