x-service-defaults: &service-defaults
  restart: unless-stopped
  environment:
    TZ: Europe/Warsaw

services:
  nomad-admin:
    <<: *service-defaults
    image: ghcr.io/crosstalk-solutions/project-nomad:latest
    pull_policy: always
    container_name: nomad-admin
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /opt/nomad/storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - proxy
      - nomad-internal
    env_file:
      - /opt/nomad/nomad.env
    environment:
      NODE_ENV: production
      PORT: 8080
      HOST: 0.0.0.0
      NOMAD_STORAGE_PATH: /opt/nomad/storage
      REDIS_HOST: nomad-redis
      REDIS_PORT: 6379
      DB_HOST: nomad-mysql
      DB_PORT: 3306
      DB_DATABASE: nomad
      DB_USER: nomad_user
      DB_NAME: nomad
      DB_SSL: "false"
    depends_on:
      nomad-mysql:
        condition: service_healthy
      nomad-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      traefik.enable: "true"
      traefik.docker.network: proxy
      traefik.http.services.nomad.loadbalancer.server.port: "8080"
      traefik.http.routers.nomad.rule: "Host(`nomad.dominiksiejak.pl`) || Host(`nomad.lake.dominiksiejak.pl`)"
      traefik.http.routers.nomad.middlewares: authentik@docker

  nomad-mysql:
    <<: *service-defaults
    image: mysql:8.0
    container_name: nomad-mysql
    env_file:
      - /opt/nomad/nomad.env
    environment:
      MYSQL_DATABASE: nomad
      MYSQL_USER: nomad_user
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nomad-internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 10

  nomad-redis:
    <<: *service-defaults
    image: redis:7-alpine
    container_name: nomad-redis
    volumes:
      - redis_data:/data
    networks:
      - nomad-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  proxy:
    external: true
  nomad-internal:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
