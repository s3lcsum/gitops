# Gatus Configuration
# Migrated from terraform/uptime-kuma monitors; keep in sync with stacks/ + traefik/dynamic.yaml

metrics: true

storage:
  type: postgres
  path: "postgres://${GATUS_DB_USER}:${GATUS_DB_PASSWORD}@${GATUS_DB_HOST}:5432/${GATUS_DB_NAME}?sslmode=disable"

alerting:
  telegram:
    token: ${TELEGRAM_BOT_TOKEN}
    id: ${TELEGRAM_CHAT_ID}

  # email:
  #   host: ${SMTP_HOST}
  #   port: ${SMTP_PORT}
  #   username: ${SMTP_USERNAME}
  #   password: ${SMTP_PASSWORD}
  #   from: ${SMTP_FROM}
  #   to: ${SMTP_TO}
  #   default-alert:
  #     enabled: true
  #     failure-threshold: 5
  #     success-threshold: 2
  #     send-on-resolved: true

ui:
  title: Homelab Status
  header: Service Status Dashboard

endpoints:
  # --- Core / ops
  - name: "portainer"
    url: https://portainer.lake.dominiksiejak.pl
    <<: &defaults
      interval: 15m
      client:
        timeout: 3s
      alerts:
        - type: telegram
          failure-threshold: 4
          success-threshold: 2
          send-on-resolved: true
      conditions:
        - "[STATUS] < 400"
        - "[CERTIFICATE_EXPIRATION] > 48h"

  - name: "vault"
    url: https://vault.lake.dominiksiejak.pl
    <<: *defaults

  - name: "netbox"
    url: https://netbox.lake.dominiksiejak.pl
    <<: *defaults

  - name: "dozzle"
    url: https://dozzle.lake.dominiksiejak.pl
    <<: *defaults

  - name: "auth"
    url: https://auth.dominiksiejak.pl
    <<: *defaults

  # --- Network / metal (traefik/dynamic.yaml file provider)
  - name: "proxmox"
    url: https://proxmox.lake.dominiksiejak.pl
    <<: *defaults

  - name: "router"
    url: https://router.lake.dominiksiejak.pl
    <<: *defaults

  - name: "nas"
    url: https://nas.lake.dominiksiejak.pl
    <<: *defaults

  - name: "argocd"
    url: https://argocd.lake.dominiksiejak.pl
    <<: *defaults

  # --- Mediabox
  - name: "jellyfin"
    url: https://jellyfin.lake.dominiksiejak.pl
