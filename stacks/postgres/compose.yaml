
services:
  postgres:
    image: postgres:18.4
    container_name: postgres
    restart: always
    ports:
      - "0.0.0.0:5432:5432"
    env_file:
      - /opt/postgres/postgres.env
    volumes:
      - data:/var/lib/postgresql/data
    networks:
      database:
        aliases:
          - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]

  adminer:
    image: adminer:4.17.1
    container_name: adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - proxy
      - database
    labels:
      traefik.enable: true
      traefik.http.routers.adminer.rule: "Host(`adminer.lake.dominiksiejak.pl`)"
      traefik.http.routers.adminer.entrypoints: websecure
      traefik.http.routers.adminer.middlewares: "authentik@docker"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    container_name: postgres-exporter
    restart: unless-stopped
    env_file:
      - /opt/postgres/postgres.env
    networks:
      - database
      - metrics
    depends_on:
      postgres:
        condition: service_healthy

networks:
  database:
    external: true
  metrics:
    external: true
  proxy:
    external: true

volumes:
  data:
    driver: local
    driver_opts:
      type: none
      device: /var/lib/postgresql
      o: bind
