# https://hub.docker.com/r/linuxserver/unifi-network-application

services:
  unifi:
    image: lscr.io/linuxserver/unifi-network-application:10.4.57
    container_name: unifi
    restart: unless-stopped
    # /opt/unifi/unifi.env must define MONGO_PASS and MONGO_INITDB_ROOT_PASSWORD
    # with the same value (app reads the former, unifi-db init reads the latter).
    env_file:
      - /opt/unifi/unifi.env
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Warsaw
      MONGO_USER: unifi
      MONGO_HOST: unifi-db
      MONGO_PORT: 27017
      MONGO_DBNAME: unifi
      MONGO_AUTHSOURCE: admin
    volumes:
      - config:/config
    ports:
      - 3478:3478/udp
      - 10001:10001/udp
      - 8080:8080
    networks:
      - proxy
      - unifi
    depends_on:
      - unifi-db
    labels:
      traefik.enable: true
      traefik.http.services.unifi.loadbalancer.server.port: 8443
      traefik.http.services.unifi.loadbalancer.server.scheme: https
      homepage.group: Network
      homepage.name: UniFi
      homepage.icon: unifi

  unifi-db:
    image: mongo:8.3.3
    container_name: unifi-db
    restart: unless-stopped
    env_file:
      - /opt/unifi/unifi.env
    environment:
      MONGO_INITDB_ROOT_USERNAME: unifi
      MONGO_INITDB_DATABASE: unifi
    volumes:
      - db:/data/db
    networks:
      - unifi

networks:
  proxy:
    external: true
  unifi:

volumes:
  config:
  db:
