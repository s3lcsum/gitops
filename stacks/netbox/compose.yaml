
x-defaults: &defaults
  image: netboxcommunity/netbox:v4.6.2
  restart: unless-stopped
  user: "root:root"
  env_file:
    - /opt/netbox/netbox.env
  networks:
    - proxy
    - database
    - netbox
  volumes:
    - media:/opt/netbox/netbox/media:rw
    - reports:/opt/netbox/netbox/reports:rw
    - scripts:/opt/netbox/netbox/scripts:rw
  healthcheck:
    start_period: 40s
    timeout: 3s
    interval: 15s

services:
  netbox:
    <<: *defaults
    container_name: netbox
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:8080/login/ || exit 1
    labels:
      traefik.enable: true
      traefik.http.services.netbox.loadbalancer.server.port: 8080
      homepage.group: Data
      homepage.name: NetBox
      homepage.icon: netbox

  netbox-worker:
    <<: *defaults
    container_name: netbox-worker
    depends_on:
      redis:
        condition: service_healthy
    command:
      - /opt/netbox/venv/bin/python
      - /opt/netbox/netbox/manage.py
      - rqworker
    healthcheck:
      test: ps -aux | grep -v grep | grep -q rqworker || exit 1

  redis:
    image: docker.io/valkey/valkey:9.1.0-alpine
    container_name: netbox-redis
    restart: unless-stopped
    networks:
      - netbox
    volumes:
      - cache:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  netbox:
    driver: bridge
  proxy:
    external: true
  database:
    external: true

volumes:
  media:
  reports:
  scripts:
  cache:
