velero:
  initContainers:
    - name: velero-plugin-for-aws
      image: velero/velero-plugin-for-aws:v1.11.0
      volumeMounts:
        - mountPath: /target
          name: plugins

  configuration:
    backupStorageLocation:
      - name: default
        provider: aws
        bucket: velero-backups
        config:
          region: us-east-1
          s3ForcePathStyle: true
          # Point to Backblaze B2 or any S3-compatible endpoint.
          s3Url: ""

    volumeSnapshotLocation: []

  schedules:
    daily:
      disabled: false
      schedule: "0 3 * * *"
      template:
        ttl: 720h0m0s
        includedNamespaces:
          - "*"
        storageLocation: default

  credentials:
    useSecret: true
    secretContents:
      cloud: |
        [default]
        aws_access_key_id=<set-via-external-secret>
        aws_secret_access_key=<set-via-external-secret>
