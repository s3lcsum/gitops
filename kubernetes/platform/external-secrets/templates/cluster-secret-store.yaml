apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  provider:
    vault:
      # Update this to the in-cluster Vault address once Vault is migrated,
      # or keep pointing at the Docker-hosted instance during coexistence.
      server: https://vault.lake.dominiksiejak.pl
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
