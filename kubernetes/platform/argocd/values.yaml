argo-cd:
  fullnameOverride: argocd

  global:
    domain: argocd.lake.dominiksiejak.pl
    # Homelab: control-plane taint; repeat on components (chart does not apply global to all pods).
    tolerations: &controlPlaneTolerations
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

  configs:
    params:
      # TLS terminated at the Gateway; ArgoCD serves plain HTTP.
      server.insecure: true

  server:
    replicas: 1
    tolerations: *controlPlaneTolerations

  controller:
    replicas: 1
    tolerations: *controlPlaneTolerations

  repoServer:
    replicas: 1
    tolerations: *controlPlaneTolerations

  redis:
    enabled: true
    tolerations: *controlPlaneTolerations

  applicationSet:
    replicas: 1
    tolerations: *controlPlaneTolerations

  dex:
    enabled: false

  notifications:
    enabled: false
