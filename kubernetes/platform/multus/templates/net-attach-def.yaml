apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: homelab-lan
  namespace: kube-system
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "ipvlan",
      "master": "eth0",
      "mode": "l2",
      "ipam": {
        "type": "host-local",
        "ranges": [[{
          "subnet": "192.168.89.0/24",
          "rangeStart": "192.168.89.230",
          "rangeEnd": "192.168.89.239"
        }]],
        "routes": [{"dst": "192.168.89.0/24"}]
      }
    }
