# ClusterIP Service: pairs with openclaw-dashboard-endpointslice.yaml. Envoy Gateway
# proxies to the OpenClaw UI on the same host as the Podman/Kubernetes machine (Node
# listens on *:18789; gvproxy uses :80/:443).
apiVersion: v1
kind: Service
metadata:
  name: openclaw-dashboard
  namespace: default
spec:
  ports:
    - name: http
      port: 80
      targetPort: 18789
      protocol: TCP
