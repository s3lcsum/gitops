apiVersion: apps/v1
kind: Deployment
metadata:
  name: watchyourlan
  labels:
    app.kubernetes.io/name: watchyourlan
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: watchyourlan
  template:
    metadata:
      labels:
        app.kubernetes.io/name: watchyourlan
      annotations:
        k8s.v1.cni.cncf.io/networks: kube-system/homelab-lan
    spec:
      containers:
        - name: watchyourlan
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: watchyourlan-env
                optional: true
          securityContext:
            capabilities:
              add: [NET_RAW, NET_ADMIN]
          volumeMounts:
            - name: data
              mountPath: /data/WatchYourLAN
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: watchyourlan-data
