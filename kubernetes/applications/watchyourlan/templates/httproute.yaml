apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: watchyourlan
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
  hostnames:
    {{- range .Values.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - backendRefs:
        - name: watchyourlan
          port: 80
