{{/*
  VPN gateway pod: gluetun + qBittorrent + SABnzbd share a network namespace,
  replicating Docker Compose `network_mode: service:gluetun`.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpn-gateway
  labels:
    app.kubernetes.io/name: mediabox
    app.kubernetes.io/component: vpn-gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mediabox
      app.kubernetes.io/component: vpn-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mediabox
        app.kubernetes.io/component: vpn-gateway
    spec:
      containers:
        - name: gluetun
          image: "{{ .Values.gluetun.image.repository }}:{{ .Values.gluetun.image.tag }}"
          securityContext:
            capabilities:
              add: [NET_ADMIN]
          env:
            - name: TZ
              value: {{ .Values.timezone }}
          envFrom:
            - secretRef:
                name: gluetun-env
          ports:
            - name: qbt
              containerPort: {{ .Values.qbittorrent.port }}
            - name: sab
              containerPort: {{ .Values.sabnzbd.port }}
          readinessProbe:
            exec:
              command: ["sh", "-c", "nc -z localhost 8000"]
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi

        - name: qbittorrent
          image: "{{ .Values.qbittorrent.image.repository }}:{{ .Values.qbittorrent.image.tag }}"
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: UMASK
              value: "002"
            - name: TZ
              value: {{ .Values.timezone }}
          volumeMounts:
            - name: qbt-config
              mountPath: /config
            - name: local-media
              mountPath: /mnt/LOCAL_MEDIA
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.qbittorrent.port }}
            initialDelaySeconds: 90
            periodSeconds: 30

        - name: sabnzbd
          image: "{{ .Values.sabnzbd.image.repository }}:{{ .Values.sabnzbd.image.tag }}"
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: UMASK
              value: "002"
            - name: TZ
              value: {{ .Values.timezone }}
          envFrom:
            - secretRef:
                name: sabnzbd-env
                optional: true
          volumeMounts:
            - name: sab-config
              mountPath: /config
            - name: local-media
              mountPath: /mnt/LOCAL_MEDIA
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api?mode=version
              port: {{ .Values.sabnzbd.port }}
            initialDelaySeconds: 90
            periodSeconds: 30

      volumes:
        - name: qbt-config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: sab-config
          persistentVolumeClaim:
            claimName: sabnzbd-config
        - name: local-media
          hostPath:
            path: {{ .Values.media.localMediaPath }}
            type: DirectoryOrCreate
