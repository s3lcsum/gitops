apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  labels:
    app.kubernetes.io/name: mediabox
    app.kubernetes.io/component: radarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mediabox
      app.kubernetes.io/component: radarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mediabox
        app.kubernetes.io/component: radarr
    spec:
      containers:
        - name: radarr
          image: "{{ .Values.radarr.image.repository }}:{{ .Values.radarr.image.tag }}"
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: UMASK
              value: "002"
            - name: TZ
              value: {{ .Values.timezone }}
          ports:
            - name: http
              containerPort: {{ .Values.radarr.port }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: local-media
              mountPath: /mnt/LOCAL_MEDIA
            - name: nas-media
              mountPath: /mnt/NAS_Shared_Media
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-config
        - name: local-media
          hostPath:
            path: {{ .Values.media.localMediaPath }}
            type: DirectoryOrCreate
        - name: nas-media
          hostPath:
            path: {{ .Values.media.nasSharedMediaPath }}
            type: DirectoryOrCreate
