apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  labels:
    app.kubernetes.io/name: mediabox
    app.kubernetes.io/component: seerr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mediabox
      app.kubernetes.io/component: seerr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mediabox
        app.kubernetes.io/component: seerr
    spec:
      containers:
        - name: seerr
          image: "{{ .Values.seerr.image.repository }}:{{ .Values.seerr.image.tag }}"
          env:
            - name: TZ
              value: {{ .Values.timezone }}
          ports:
            - name: http
              containerPort: {{ .Values.seerr.port }}
          volumeMounts:
            - name: config
              mountPath: /app/config
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: seerr-config
