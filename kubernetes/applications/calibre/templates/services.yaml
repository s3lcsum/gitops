apiVersion: v1
kind: Service
metadata:
  name: calibre
spec:
  selector:
    app.kubernetes.io/name: calibre
    app.kubernetes.io/component: server
  ports:
    - name: gui
      port: 8080
      targetPort: gui
    - name: api
      port: 8083
      targetPort: api
---
apiVersion: v1
kind: Service
metadata:
  name: calibre-web
spec:
  selector:
    app.kubernetes.io/name: calibre
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: http
