apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: calibre-gui
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
  hostnames:
    - {{ .Values.hostnames.gui | quote }}
  rules:
    - backendRefs:
        - name: calibre
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: calibre-api
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
  hostnames:
    - {{ .Values.hostnames.api | quote }}
  rules:
    - backendRefs:
        - name: calibre
          port: 8083
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: calibre-web
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
  hostnames:
    {{- range .Values.hostnames.web }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - backendRefs:
        - name: calibre-web
          port: 80
