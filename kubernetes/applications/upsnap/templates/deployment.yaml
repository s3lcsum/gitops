apiVersion: apps/v1
kind: Deployment
metadata:
  name: upsnap
  labels:
    app.kubernetes.io/name: upsnap
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: upsnap
  template:
    metadata:
      labels:
        app.kubernetes.io/name: upsnap
      annotations:
        k8s.v1.cni.cncf.io/networks: kube-system/homelab-lan
    spec:
      containers:
        - name: upsnap
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
          securityContext:
            capabilities:
              add: [NET_RAW]
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /app/pb_data
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: upsnap-data
