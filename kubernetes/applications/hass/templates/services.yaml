apiVersion: v1
kind: Service
metadata:
  name: homeassistant
spec:
  selector:
    app.kubernetes.io/name: hass
    app.kubernetes.io/component: homeassistant
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
spec:
  selector:
    app.kubernetes.io/name: hass
    app.kubernetes.io/component: mosquitto
  ports:
    - name: mqtt
      port: 1883
      targetPort: mqtt
---
apiVersion: v1
kind: Service
metadata:
  name: zigbee2mqtt
spec:
  selector:
    app.kubernetes.io/name: hass
    app.kubernetes.io/component: zigbee2mqtt
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: esphome
spec:
  selector:
    app.kubernetes.io/name: hass
    app.kubernetes.io/component: esphome
  ports:
    - name: http
      port: 80
      targetPort: http
