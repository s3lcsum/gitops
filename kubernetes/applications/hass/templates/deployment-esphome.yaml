apiVersion: apps/v1
kind: Deployment
metadata:
  name: esphome
  labels:
    app.kubernetes.io/name: hass
    app.kubernetes.io/component: esphome
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hass
      app.kubernetes.io/component: esphome
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hass
        app.kubernetes.io/component: esphome
      annotations:
        k8s.v1.cni.cncf.io/networks: kube-system/homelab-lan
    spec:
      containers:
        - name: esphome
          image: "{{ .Values.esphome.image.repository }}:{{ .Values.esphome.image.tag }}"
          env:
            - name: TZ
              value: {{ .Values.timezone }}
          ports:
            - name: http
              containerPort: {{ .Values.esphome.port }}
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: esphome-config
