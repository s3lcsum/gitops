apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-synthetic-agent
  labels:
    app.kubernetes.io/name: grafana-synthetic-agent
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana-synthetic-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana-synthetic-agent
    spec:
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/local/bin/synthetic-monitoring-agent
          args:
            - -api-server-address=$(API_SERVER)
            - -api-token=$(API_TOKEN)
          envFrom:
            - secretRef:
                name: grafana-synthetic-agent-env
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
